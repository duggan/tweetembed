<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>tweetembed</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px;
    background: #f7f9fa;
    color: #0f1419;
    transition: background 0.2s, color 0.2s;
  }

  body.dark {
    background: #000000;
    color: #e7e9ea;
  }

  h1 {
    font-size: 28px;
    margin-bottom: 8px;
  }

  .subtitle {
    color: #536471;
    font-size: 15px;
    margin-bottom: 32px;
  }

  body.dark .subtitle {
    color: #8b98a5;
  }

  #drop-zone {
    width: 100%;
    max-width: 500px;
    padding: 48px 24px;
    border: 2px dashed #cfd9de;
    border-radius: 16px;
    text-align: center;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
  }

  body.dark #drop-zone {
    border-color: #38444d;
  }

  #drop-zone:hover, #drop-zone.dragover {
    border-color: #1d9bf0;
    background: rgba(29, 155, 240, 0.05);
  }

  #drop-zone p {
    font-size: 16px;
    margin-bottom: 8px;
  }

  #drop-zone .hint {
    font-size: 13px;
    color: #536471;
  }

  body.dark #drop-zone .hint {
    color: #8b98a5;
  }

  #file-input {
    display: none;
  }

  #loading-section {
    display: none;
    text-align: center;
  }

  .spinner {
    width: 32px;
    height: 32px;
    border: 3px solid #cfd9de;
    border-top-color: #1d9bf0;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 12px;
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  #loaded-section {
    display: none;
    width: 100%;
    max-width: 600px;
  }

  #account-info {
    font-size: 15px;
    margin-bottom: 16px;
    text-align: center;
    color: #536471;
  }

  body.dark #account-info {
    color: #8b98a5;
  }

  .input-row {
    display: flex;
    gap: 8px;
    margin-bottom: 16px;
  }

  #tweet-input {
    flex: 1;
    padding: 10px 14px;
    font-size: 15px;
    border: 1px solid #cfd9de;
    border-radius: 8px;
    outline: none;
    background: inherit;
    color: inherit;
  }

  body.dark #tweet-input {
    border-color: #38444d;
  }

  #tweet-input:focus {
    border-color: #1d9bf0;
  }

  #render-btn {
    padding: 10px 20px;
    font-size: 15px;
    font-weight: 600;
    background: #1d9bf0;
    color: #fff;
    border: none;
    border-radius: 8px;
    cursor: pointer;
  }

  #render-btn:hover {
    background: #1a8cd8;
  }

  .controls {
    display: flex;
    gap: 8px;
    justify-content: center;
    margin-bottom: 16px;
  }

  .controls button {
    padding: 6px 14px;
    font-size: 13px;
    background: transparent;
    border: 1px solid #cfd9de;
    border-radius: 20px;
    cursor: pointer;
    color: inherit;
  }

  body.dark .controls button {
    border-color: #38444d;
  }

  .controls button:hover {
    background: rgba(29, 155, 240, 0.1);
  }

  #tweet-container {
    display: flex;
    justify-content: center;
  }

  #error-msg {
    display: none;
    color: #f4212e;
    font-size: 14px;
    text-align: center;
    margin-bottom: 12px;
  }
</style>
</head>
<body>

<h1>tweetembed</h1>
<p class="subtitle">Render tweets from your Twitter archive, entirely in-browser.</p>

<div id="upload-section">
  <div id="drop-zone">
    <p>Drop your Twitter archive zip here, or click to browse</p>
    <span class="hint">Works offline. Nothing is uploaded.</span>
  </div>
  <input type="file" id="file-input" accept=".zip">
</div>

<div id="loading-section">
  <div class="spinner"></div>
  <p>Loading archive&hellip;</p>
</div>

<div id="loaded-section">
  <p id="account-info"></p>
  <div class="input-row">
    <input type="text" id="tweet-input" placeholder="Tweet ID or URL">
    <button id="render-btn">Render</button>
  </div>
  <div class="controls">
    <button id="theme-toggle">Dark</button>
    <button id="logo-toggle">X Logo</button>
    <button id="copy-html-btn" style="display:none">Copy HTML</button>
    <button id="download-html-btn" style="display:none">Download HTML</button>
  </div>
  <div id="error-msg"></div>
  <div id="tweet-container"></div>
</div>

<script type="module" src="dist/app.js"></script>
</body>
</html>
