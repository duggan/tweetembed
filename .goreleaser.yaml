version: 2

builds:
  - main: .
    binary: tweetembed
    ldflags:
      - -s -w -X main.version={{.Version}}
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip

brews:
  - repository:
      owner: duggan
      name: homebrew-tap
      token: "{{ .Env.TAP_GITHUB_TOKEN }}"
    homepage: https://github.com/duggan/tweetembed
    description: Turn tweets from a Twitter archive into standalone embeddable HTML
    license: MIT
    install: |
      bin.install "tweetembed"

changelog:
  sort: asc
